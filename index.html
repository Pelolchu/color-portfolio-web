<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorista - Antes & Después</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="comparison-slider">
            <div class="comparison-slider__wrapper">
                <!-- Video "antes" (base) -->
                <video autoplay muted playsinline loop class="comparison-slider__img comparison-slider__img--before">
                    <source src="videos/before.mp4" type="video/mp4">
                    <source src="videos/before.webm" type="video/webm">
                </video>
                
                <!-- Contenedor del video "después" con clip -->
                <div class="comparison-slider__overlay">
                    <video autoplay muted playsinline loop class="comparison-slider__img comparison-slider__img--after">
                        <source src="videos/after.mp4" type="video/mp4">
                        <source src="videos/after.webm" type="video/webm">
                    </video>
                </div>
                
                <!-- Divisor (línea indicadora) -->
                <div class="comparison-slider__divider"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
